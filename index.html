<!DOCTYPE html>
<html lang="pt-BR">
    <!--
      Documento HTML principal do formulário de cadastro de cards.
      Estrutura semântica com componentes dinâmicos renderizados via assets/js/script.js.
      Manter este arquivo minimalista: a lógica está toda no JS; o estilo, no CSS.
      Acessibilidade: labels associados por for/id, mensagens de erro próximas aos campos.
    -->
    <head>
        <meta charset="UTF-8">
        <!--
          Dependências externas:
          - Pikaday: componente de calendário (apenas CSS aqui, JS no fim do body)
          - Bootstrap 5: layout do modal e utilidades
        -->
        <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/pikaday/css/pikaday.css">

        <link
            href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
            rel="stylesheet">

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous">
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
            rel="stylesheet">
        <link rel="stylesheet" href="./assets/css/style.css">
        <meta name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <!--
          Notas:
          - Os campos de Produto, AIESEC e Como conheceu podem ser criados dinamicamente, dependendo de parâmetros UTM.
          - Não remover comentários existentes; as anotações abaixo apenas complementam a documentação.
        -->
    </head>

    <body>
        <div class="form-container">
            <img src="https://aiesec-logos.s3.eu-west-1.amazonaws.com/Blue-Logo.png" alt="Logo da AIESEC" class="form-logo">
            <!-- <div class="progress" id="progress"></div> -->
            <form id="meuForm"
                aria-describedby="erro-nascimento erro-politica">

                <!-- Saudação dinâmica -->
                <h2 id="greeting"></h2>

                <!-- Data de nascimento (pré-preenchida e editável) -->
                <label for="nascimento">Data de Nascimento *</label>
                <div class="input-calendario">
                    <input type="text" id="nascimento" placeholder="DD/MM/YYYY" maxlength="10" aria-describedby="erro-nascimento" />
                    <span aria-hidden="true">📅</span>
                </div>
                <input type="hidden" id="nascimento-iso" name="nascimento" />
                <div class="error-msg" id="erro-nascimento" role="alert" aria-live="polite"></div>

                <!-- Campos a serem preenchidos pelo lead -->
                <div class="mb-3">
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" placeholder=" ">
                        <label for="password" class="form-label">Definir senha *</label>
                        <span class="input-group-text" id="togglePassword" style="cursor: pointer;">
                            <i class="bi bi-eye"></i>
                        </span>
                    </div>
                    <span class="error-msg" id="erro-senha" role="alert" aria-live="polite"></span>
                </div>

                <!-- Campos opcionais que agora são parte do complemento -->
                <div id="idiomas" class="input-extra"></div>
                <div id="cursos" class="input-extra"></div>
                <div id="areas-atuacao" class="input-extra"></div>
                <div id="niveis-mercado" class="input-extra"></div>
                <div class="input-extra">
                    <label for="semestre">Selecione o semestre atual</label>
                    <select id="semestre">
                        <option value disabled selected>Selecione o semestre atual</option>
                        <option value="1">1º Semestre</option>
                        <option value="2">2º Semestre</option>
                        <option value="3">3º Semestre</option>
                        <option value="4">4º Semestre</option>
                        <option value="5">5º Semestre</option>
                        <option value="6">6º Semestre</option>
                        <option value="7">7º Semestre</option>
                        <option value="8">8º Semestre</option>
                        <option value="9">Outro</option>
                    </select>
                </div>
                <label for="curriculo">Anexe seu curriculo</label>
                <input placeholder="curriculo" id="curriculo" class="input-extra" type="file" accept=".pdf">

                <button class="next" type="submit" id="btn-enviar">Enviar</button>

            </form>
            <span class="copyright">&copy; AIESEC no Brasil - 2026</span>
        </div>
        <!-- Modal -->
        <div class="modal fade" id="exampleModalLong" tabindex="-1"
            aria-labelledby="exampleModalLongTitle" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"
                            id="exampleModalLongTitle">Confirme seus dados:</h5>
                        <button type="button" class="btn-close"
                            data-bs-dismiss="modal" aria-label="Close"
                            id="botaoFechar"></button>
                    </div>
                    <div class="modal-body">
                        <pre id="DadosAqui"></pre>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"
                            data-bs-dismiss="modal"
                            id="botaoCancelar">Cancelar</button>
                        <button type="button" class="btn btn-primary"
                            id="botaoConfirmar">Enviar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- JS externos carregados ao final para não bloquear a renderização -->
        <script src="https://cdn.jsdelivr.net/npm/pikaday/pikaday.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
        <script src="./assets/js/script.js"></script>
    </body>

</html>
